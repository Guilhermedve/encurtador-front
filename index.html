<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encurtador de URLs</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Encurtador de URLs</h1>
        <form id="form">
            <div class="form-group">
                <label id="label1" for="url">Insira a URL original</label>
                <input type="text" id="url" 
                required placeholder="https://exemplo.com">
            </div>
            <button id="butao" type="submit" >Encurtar</button>
        </form>


        <div id="resultado">
            <p id="p">URL encurtada: <strong id="shortUrl"></strong></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
